<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h2>Calculator App</h2>
    <div class="calculator-body">
      <input class="display-section" type="text" readonly disabled></input>
      <div class="input-buttons">
        <div class="row-1">
          <button class="calc-button operator">C</button>
          <button class="calc-button operator">+/-</button>
          <button class="calc-button operator">%</button>
          <button class="calc-button functions-column">/</button>
        </div>
        <div class="row-2">
          <button class="calc-button">7</button>
          <button class="calc-button">8</button>
          <button class="calc-button">9</button>
          <button class="calc-button functions-column">*</button>
        </div>
        <div class="row-3">
          <button class="calc-button">4</button>
          <button class="calc-button">5</button>
          <button class="calc-button">6</button>
          <button class="calc-button functions-column">-</button>
        </div>
        <div class="row-4">
          <button class="calc-button">1</button>
          <button class="calc-button">2</button>
          <button class="calc-button">3</button>
          <button class="calc-button functions-column">+</button>
        </div>
        <div class="row-5">
          <button class="calc-button">.</button>
          <button class="calc-button">0</button>
          <button class="calc-button">x</button>
          <button class="calc-button functions-column">=</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
