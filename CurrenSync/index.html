<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CurrenSync - Fast Currency Converter</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <h1>CurrenSync</h1>
    <main>
      <div class="container">
        <form action="">
          <div class="amount">
            <p>Enter Amount</p>
            <input
              type="number"
              name=""
              id=""
              min="1"
              max="20000"
              value="1000"
            />
          </div>
          <div class="dropdown">
            <div class="from">
              <p>From</p>
              <div class="select-container">
                <img src="https://flagsapi.com/US/shiny/64.png" />
                <select name="from" id=""></select>
              </div>
            </div>
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
            <div class="to">
              <p>To</p>
              <div class="select-container">
                <img src="https://flagsapi.com/IN/shiny/64.png" />
                <select name="to" id=""></select>
              </div>
            </div>
          </div>
          <div class="display">1 USD = 92.65 INR</div>
          <div class="loader hidden"></div>

          <button type="submit">Get Exchange Rate</button>
        </form>
      </div>
    </main>
    <script src="countryInfo.js"></script>
    <script src="script.js"></script>
  </body>
</html>
